toc-title: "Contents"
abstract: |
  This report presents the results of a pre-registered, independent Monte
  Carlo verification of orientation-clustering claims associated with the
  Buildreps database of approximately 1,159 ancient pyramids and temples.
  Under the most stringent null model tested (geographic-block conditional,
  preserving site geography, hemisphere, and regional bearing patterns),
  two of five proposed paleopole latitudes — Pole II (76.0°N) and Pole III
  (72.2°N) — show robust within-hemisphere clustering of intersections
  (Šidák-corrected p = 0.0015 and 0.0005 respectively). The remaining
  three proposed poles (I, IV, V) do not show robust clustering under
  principled nulls. The aggregate primary test statistic, formally
  significant at p = 0.0001 under the pre-registered unconditional null,
  is shown by diagnostic analysis to be an artifact of hemisphere-selection
  in the in-range subset; under nulls that preserve the selection criterion,
  the aggregate signal vanishes. A descriptive finding from the longitude
  scan: the 47°W meridian is rank 10 of 72 most-clustered meridians in the
  observed data, with the natural attractor at −20°E. The framework's
  broader interpretive claim — that the observed concentrations represent
  former positions of Earth's rotational axis — is not tested by an
  orientation-clustering analysis and would require independent geological
  evidence.

